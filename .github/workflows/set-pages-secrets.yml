name: Set Cloudflare Pages secrets

# One-shot (re-runnable): push runtime secrets to the Pages project so the
# contact-form Function can reach Notion at the edge. Build-time GitHub secrets
# are NOT visible to Pages Functions — they need their own project secrets.
on:
  workflow_dispatch: {}

jobs:
  set:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install wrangler
        run: npm install --no-save wrangler@4
      - name: Put Pages secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CONTACT_DB_ID: ${{ secrets.NOTION_CONTACT_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          printf '%s' "$NOTION_TOKEN" | npx wrangler pages secret put NOTION_TOKEN --project-name=geo-traveller
          printf '%s' "$NOTION_CONTACT_DB_ID" | npx wrangler pages secret put NOTION_CONTACT_DB_ID --project-name=geo-traveller
          if [ -n "$RESEND_API_KEY" ]; then
            printf '%s' "$RESEND_API_KEY" | npx wrangler pages secret put RESEND_API_KEY --project-name=geo-traveller
            echo "RESEND_API_KEY set."
          else
            echo "RESEND_API_KEY not provided — skipping (acknowledgement emails stay off)."
          fi
          echo "Done."
