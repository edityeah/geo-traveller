name: Build and deploy to Cloudflare Pages

on:
  # Run every 30 minutes — picks up any Notion changes without manual action.
  schedule:
    - cron: '*/30 * * * *'
  # Allow manual trigger from the GitHub UI or API (workflow_dispatch).
  workflow_dispatch: {}
  # Build on every push to main (e.g. when you edit code in the repo).
  push:
    branches: [main]

# Cancel an older run if a newer one starts — avoids piling up deploys.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (pulls latest from Notion)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PAGES_DATABASE_ID: ${{ secrets.NOTION_PAGES_DATABASE_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=geo-traveller --branch=main --commit-dirty=true
