name: Trending-topic blog agent

on:
  # Every 2 hours → 12 runs/day, one post each (mix decided from Notion state:
  # ~5 evergreen / 7 news per day, configurable via env below).
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      regen_page_id:
        description: 'If set, regenerate this Notion page id instead of running the planner'
        required: false
        default: ''

concurrency:
  group: agent
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run the agent
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Optional — improve image coverage when set; safe to leave unset.
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          REGEN_PAGE_ID: ${{ github.event.inputs.regen_page_id }}
        run: |
          if [ -n "$REGEN_PAGE_ID" ]; then
            npx tsx scripts/agent/regen.ts "$REGEN_PAGE_ID"
          else
            npm run agent
          fi
